upstream aroba_project {
    server aroba_web:8001;
}

server {
    listen 80;
    server_name imb.4fun.uz;

    location / {
        include proxy_params;
        proxy_pass http://aroba_project;
    }

    location /static/ {
        alias /aroba/static/;
    }

    location /media/ {
        alias /aroba/media/;
    }
}
