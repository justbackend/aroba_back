version: '3.8'

services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:14
    volumes:
#      - postgres_data:/var/lib/postgresql/data/
      - ./dump.sql:/docker-entrypoint-initdb.d/dump.sql
    environment:
      DB_NAME: aroba
      DB_USER: aroba
      DB_PASSWORD: aroba
      DB_HOST: db
      DB_PORT: 5432

volumes:
  postgres_data:
