version: '3.8'

services:
  aroba_web:
    build: .
    container_name: aroba_web
    entrypoint: ./entrypoint.sh
    volumes:
      - .:/app
      - ./static:/aroba/static
      - ./media:/aroba/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - aroba_db

  aroba_db:
    image: postgres:14
    env_file:
      - .env
    volumes:
      - ./postgres:/var/lib/postgresql/data
      - ./dump.sql:/docker-entrypoint-initdb.d/dump.sql
    environment:
      - POSTGRES_HOST=${DB_HOST}
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}

  nginx:
    build:
      context: ./nginx
    env_file:
      - .env
    volumes:
      - ./static:/aroba/static
      - ./media:/aroba/media
    ports:
      - "${NGINX_EXTERNAL_PORT}:80"
    depends_on:
      - aroba_web



