version: '3.8'

services:
  aroba_db:
    image: postgres:15
    container_name: aroba_db
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./dump.sql:/docker-entrypoint-initdb.d/dump.sql
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER}" ]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:latest
    container_name: aroba_redis
    restart: always
    volumes:
      - redis_data:/data

  aroba_web:
    build: .
    container_name: aroba_web
    entrypoint: ./entrypoint.sh
    volumes:
      - .:/aroba
      - ./static:/aroba/static
      - ./media:/aroba/media
    ports:
      - "8001:8001"
      - "8002:8002"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.production
      - DB_HOST=aroba_db
#      - IMB_DB_HOST=host.docker.internal
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379
      - REDIS_HOST=redis
    depends_on:
      - aroba_db
      - redis
    restart: always
#    extra_hosts:
#      - "host.docker.internal:host-gateway"
