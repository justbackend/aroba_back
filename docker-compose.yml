version: '3.8'

services:
  aroba_web:
    build: .
    container_name: aroba_web
    entrypoint: ./entrypoint.sh
    volumes:
      - .:/aroba
      - ./static:/aroba/static
      - ./media:/aroba/media
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.production
      - DB_HOST=aroba_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379
    restart: always
    depends_on:
      - aroba_db
      - redis

  aroba_db:
    image: postgres:16
    container_name: aroba_db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}

  redis:
    image: redis:latest
    container_name: aroba_redis
    restart: always
    volumes:
      - redis_data:/data

