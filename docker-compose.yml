version: '3.8'

services:
  aroba_web:
    build: .
    container_name: aroba_web
    entrypoint: ./entrypoint.sh
    volumes:
      - .:/app
      - ./static:/aroba/static
      - ./media:/aroba/media
      - ./dump.sql:/aroba/dump.sql
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - DB_HOST=aroba_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379

    depends_on:
      - aroba_db
      - redis

  aroba_db:
    image: postgres:14
    container_name: aroba_db
    env_file:
      - .env
    volumes:
      - ./postgres:/var/lib/postgresql/data
      - ./dump.sql:/docker-entrypoint-initdb.d/dump.sql


  redis:
    image: redis:latest
    container_name: aroba_redis
    restart: always
    volumes:
      - ./redis:/data  # M

