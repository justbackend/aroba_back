version: '3.8'

services:
  aroba_web:
    build: .
    container_name: aroba_web
    entrypoint: ./entrypoint.sh
    volumes:
      - .:/app
      - ./static:/aroba/static
      - ./media:/aroba/media
      - ./dump.sql:/aroba/dump.sql
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      - aroba_db

  aroba_db:
    image: postgres:14
    container_name: aroba_db
    env_file:
      - .env
    volumes:
      - ./postgres:/var/lib/postgresql/data
      - ./dump.sql:/docker-entrypoint-initdb.d/dump.sql
    environment:
      - POSTGRES_HOST=${DB_HOST}
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}

